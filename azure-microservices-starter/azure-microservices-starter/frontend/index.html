<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Microservices Lab Frontend</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Azure Microservices Lab</h1>
    <p>This is a simple frontend for your Azure Static Web App.</p>
    <p><strong>API URL:</strong> <span id="api-url"></span></p>
    <button onclick="loadMessage()">Test Gateway</button>
    <h3>Response</h3>
    <pre id="output">Click the button to call the gateway.</pre>
  </div>

  <script>
    const API_BASE_URL = window.API_BASE_URL || 'http://localhost:3000';
    document.getElementById('api-url').textContent = API_BASE_URL;

    async function loadMessage() {
      const output = document.getElementById('output');
      output.textContent = 'Loading...';
      try {
        const response = await fetch(`${API_BASE_URL}/api/message`);
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = 'Error: ' + error.message + '\n\nTip: update API_BASE_URL after deployment.';
      }
    }
  </script>
</body>
</html>
